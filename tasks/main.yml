---
# tasks file for ara

- name: Import assert.yml
  ansible.builtin.import_tasks: assert.yml
  run_once: true
  delegate_to: localhost

- name: Install python3-venv for virtual environment support
  ansible.builtin.package:
    name: python3-venv
    state: present
  when:
    - ara_venv_path | length > 0
    - ansible_facts.os_family == "Debian"

- name: Create ara virtual environment directory
  ansible.builtin.file:
    path: "{{ ara_venv_path }}"
    state: directory
    mode: "0755"
  when:
    - ara_venv_path | length > 0

- name: Install ara
  ansible.builtin.pip:
    name: ara[server]
    state: present
    virtualenv: "{{ ara_venv_path | length > 0 | ternary(ara_venv_path, omit) }}"
    virtualenv_command: /usr/bin/python3 -m venv

- name: Set ara binary location depending on venv
  ansible.builtin.set_fact:
    _ara_bin_dir: "{{ ara_venv_path }}/bin"
  when:
    - ara_venv_path | length > 0

- name: Create ara service
  ansible.builtin.import_role:
    name: buluma.service
  vars:
    service_list:
      - name: ara
        description: Ansible Reports Ara
        start_command: "{{ (_ara_bin_dir | default(ara_binary_location)) }}/ara-manage runserver"
        user_name: "{{ ara_user }}"

- name: Find callback_plugins path
  when:
    - ara_callback_plugins is not defined
  block:
    - name: Try python3 from virtual environment
      ansible.builtin.command:
        cmd: "{{ _ara_bin_dir }}/python3 -m ara.setup.callback_plugins"
      register: ara_callback_plugins
      changed_when: false
      check_mode: false
      tags:
        - molecule-idempotence-notest
      when:
        - _ara_bin_dir is defined

    - name: Try python3 from system
      ansible.builtin.command:
        cmd: "{{ ara_setup_command_python3 }}"
      register: ara_callback_plugins
      changed_when: false
      tags:
        - molecule-idempotence-notest
      when:
        - _ara_bin_dir is not defined
  rescue:
    - name: Try python2 from system (fallback)
      ansible.builtin.command: "{{ ara_setup_command_python2 }}"
      register: ara_callback_plugins
      changed_when: false
      check_mode: false
      tags:
        - molecule-idempotence-notest

# - name: configure ansible to use ara with found path
#   community.general.ini_file:
#     path: "{{ ara_configuration_file }}"
#     section: defaults
#     option: callback_plugins
#     value: "{{ ara_callback_plugins.stdout }}"
#     mode: "0644"
#   notify:
#     - Restart ara
#   when:
#     - ara_python_plugins_path is not defined
#     - ara_callback_plugins is defined

- name: Configure ansible to use ara with defined path
  community.general.ini_file:
    path: "{{ ara_configuration_file }}"
    section: defaults
    option: callback_plugins
    value: "{{ ara_python_plugins_path }}"
    mode: "0644"
  notify:
    - Restart ara
  when:
    - ara_python_plugins_path is defined

- name: Configure ara
  community.general.ini_file:
    path: "{{ ara_configuration_file }}"
    section: ara
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    mode: "0644"
  notify:
    - Restart ara
  loop: "{{ ara_configuration }}"
  loop_control:
    label: "{{ item.option }}"
  when:
    - ara_configuration is defined

- name: Start and enable ara
  ansible.builtin.service:
    name: ara
    state: started
    enabled: true
  tags:
    - molecule-idempotence-notest
